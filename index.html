<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="dynamic-title">US Car Accident Settlement Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">
    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-center px-6 py-12">
        <header class="text-center mb-10">
            <h1 id="main-heading" class="text-3xl font-bold tracking-tight text-gray-900">
                US Car Accident Calculator
            </h1>
            <p id="sub-heading" class="mt-4 text-lg text-gray-600">
                Estimate your settlement payout in the US.
            </p>
        </header>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
            <p class="text-center text-sm font-semibold text-blue-600 mb-4 uppercase tracking-wider">Legal-Specific Engine v2.0</p>
            <div class="space-y-4">
                <div class="p-4 bg-gray-50 rounded-lg text-center font-bold text-gray-700">Calculator Loaded...</div>
                <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg">
                    CALCULATE MY PAYOUT
                </button>
            </div>
        </div>
    </div>

    <script>
        // 주소창에서 지역 이름을 읽어서 화면을 바꿔주는 마법
        const path = window.location.pathname.replace('/', '');
        if (path && path !== 'index.html') {
            const stateName = path.charAt(0).toUpperCase() + path.slice(1);
            document.title = `${stateName} Settlement Calculator`;
            document.getElementById('main-heading').innerText = `${stateName} Calculator`;
            document.getElementById('sub-heading').innerText = `Estimate your payout in ${stateName}.`;
        }
    </script>
</body>
</html>
