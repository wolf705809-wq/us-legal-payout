<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New York Case Audit | JDS Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --ny-navy: #0F172A; }
        body { background-color: #FAFAFA; font-family: 'Inter', sans-serif; color: #0F172A; -webkit-font-smoothing: antialiased; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .premium-btn { 
            background-color: var(--ny-navy); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 마우스 커서 디테일 */
        .premium-btn:not(:disabled) { cursor: pointer; }
        .premium-btn:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.3); background-color: #000; }
        .premium-btn:disabled { cursor: not-allowed; opacity: 0.5; }
        
        .option-card { border: 1px solid #E2E8F0; transition: all 0.2s ease; cursor: pointer; border-radius: 8px; background: white; padding: 20px; font-weight: 600; }
        .option-card:hover { border-color: var(--ny-navy); background-color: #F8FAFC; }
        .hidden { display: none !important; }
        .step-container { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="w-full bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3"><div class="w-2.5 h-2.5 rounded-full bg-slate-900"></div><span class="text-xs font-bold tracking-widest uppercase">New York Case Audit</span></div>
        <div class="border border-slate-200 text-[#94A3B8] text-[9px] px-2 py-1 uppercase font-bold tracking-tighter tracking-tighter">Attorney Advertising</div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 pt-12 pb-24 text-center w-full flex-grow">
        <h1 class="text-4xl md:text-5xl font-serif font-bold text-slate-900 mb-8 text-center">New York Recovery Review</h1>
        <div class="bg-white p-8 rounded-xl border border-slate-200 shadow-sm mb-10 text-left border-l-4 border-l-slate-900">
            <h2 class="text-2xl font-serif font-bold mb-2">Jurisdiction: New York</h2>
            <p class="text-sm text-slate-500 italic">Governed by CPLR § 1411 Pure Comparative Negligence</p>
        </div>
        <button onclick="openModal()" class="premium-btn text-white px-12 py-5 uppercase tracking-[0.2em] font-bold shadow-xl">Initiate NY Audit</button>
    </main>

    <div id="leadModal" class="hidden fixed inset-0 z-[100] flex items-end md:items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
        <div class="w-full max-w-xl bg-white shadow-2xl rounded-t-2xl md:rounded-xl flex flex-col max-h-[92vh] border border-slate-200 overflow-hidden text-left">
            <div class="px-8 py-6 border-b border-slate-100 text-left">
                <div class="flex justify-between items-center mb-4"><h3 class="font-serif font-bold text-xl text-left">NY Intake Audit</h3><button onclick="closeModal()" class="text-slate-400 p-2 text-xl">✕</button></div>
                <div id="ai-feedback-box" class="mb-4 p-3 bg-slate-50 rounded hidden border-l-4 border-l-slate-900 text-left"><p id="ai-feedback-text" class="text-[10px] font-bold text-slate-800 uppercase text-left"></p></div>
                <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden text-left"><div id="strength-gauge" class="bg-slate-900 h-full transition-all duration-700" style="width: 15%"></div></div>
            </div>

            <div id="modalBody" class="p-8 overflow-y-auto flex-grow text-left">
                <div id="step-1" class="step-container space-y-4 text-left">
                    <h3 class="text-xl font-serif font-bold text-left">Type of Incident?</h3>
                    <button onclick="handleSelect('type', 'Auto', 2, 'Motor vehicle accidents have high statutory priority.', 10)" class="option-card w-full text-left">Vehicle Collision</button>
                    <button onclick="handleSelect('type', 'Slip', 2, 'Premises liability requires notice of hazard.', 10)" class="option-card w-full text-left">Slip & Fall</button>
                </div>

                <div id="step-6" class="step-container hidden space-y-4 text-left">
                    <h3 class="text-xl font-serif font-bold text-left">Brief Narrative</h3>
                    <textarea id="narrative-box" rows="4" oninput="analyzeText()" placeholder="What happened in New York? (Min. 15 characters)" class="w-full bg-slate-50 border p-4 rounded outline-none focus:border-slate-900 text-left"></textarea>
                    <p id="char-count" class="text-[10px] text-slate-400 text-right text-left">0 / 15 characters</p>
                    <button id="narrative-next" disabled onclick="nextStep(7)" class="premium-btn w-full py-4 text-white uppercase font-bold tracking-widest text-left">Continue</button>
                </div>

                <div id="step-7" class="step-container hidden space-y-4 text-left">
                    <h3 class="text-xl font-serif font-bold text-left">Identity Details</h3>
                    <div class="grid grid-cols-2 gap-4 text-left">
                        <input type="text" id="firstName" oninput="validateEnglish(this)" placeholder="First Name (English Only)" class="bg-slate-50 border p-4 rounded w-full font-bold focus:border-slate-900 text-left">
                        <input type="text" id="lastName" oninput="validateEnglish(this)" placeholder="Last Name (English Only)" class="bg-slate-50 border p-4 rounded w-full font-bold focus:border-slate-900 text-left text-left">
                    </div>
                    <input type="email" id="email" placeholder="Email Address" class="w-full bg-slate-50 border p-4 rounded font-bold focus:border-slate-900 text-left">
                    <button onclick="nextStep(8)" class="premium-btn w-full py-4 text-white uppercase font-bold text-left text-left text-left">Proceed to Security</button>
                </div>

                <form id="step-8" class="step-container hidden space-y-4 text-left" onsubmit="submitFinalLead(event)">
                    <h3 class="text-xl font-serif font-bold text-center text-left text-left text-left">Final Authorization</h3>
                    <input type="tel" id="userPhone" placeholder="(555) 555-5555" required class="w-full border-2 border-slate-900 p-5 rounded-xl text-2xl font-bold text-center tracking-widest text-left text-left text-left text-left">
                    <div class="cf-turnstile flex justify-center text-left text-left text-left text-left text-left text-left text-left" data-sitekey="0x4AAAAAACuTQ4GK1w5nO44e"></div>
                    <label class="flex items-start gap-3 mt-4 p-4 bg-slate-50 border rounded-lg cursor-pointer text-left text-left text-left text-left text-left text-left text-left text-left text-left">
                        <input type="checkbox" id="tcpa" class="w-5 h-5 accent-slate-900 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left" required>
                        <span class="text-[10px] text-slate-600 leading-relaxed font-medium text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left">
                            I consent to be contacted. I agree to the <a href="privacy.html" class="underline">Privacy Policy</a>.
                        </span>
                    </label>
                    <button type="submit" id="submit-btn" disabled class="premium-btn w-full py-5 text-white uppercase tracking-[0.2em] font-bold text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left">Submit NY Audit</button>
                </form>

                <div id="step-scan" class="hidden py-16 text-center text-left">
                    <div class="animate-spin text-slate-900 mx-auto w-10 h-10 mb-8 text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg></div>
                    <h3 class="font-serif font-bold text-xl mb-2 italic text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left text-left">Syncing with NY Statutory Database...</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentScore = 15;
        let leadData = { state: 'New York' };

        function openModal() { document.getElementById('leadModal').classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
        function closeModal() { document.getElementById('leadModal').classList.add('hidden'); document.body.style.overflow = ''; }
        function nextStep(s) { document.querySelectorAll('.step-container').forEach(el => el.classList.add('hidden')); document.getElementById(`step-${s}`).classList.remove('hidden'); }

        // [사장님 찐 로직] 영어만 허용
        function validateEnglish(input) {
            input.value = input.value.replace(/[^A-Za-z\s]/g, '');
        }

        function handleSelect(key, val, next, feedback, bonus) {
            leadData[key] = val;
            currentScore = Math.min(95, currentScore + bonus);
            document.getElementById('strength-gauge').style.width = currentScore + '%';
            document.getElementById('ai-feedback-text').innerText = `AI INSIGHT: ${feedback}`;
            document.getElementById('ai-feedback-box').classList.remove('hidden');
            setTimeout(() => nextStep(next), 600);
        }

        function analyzeText() {
            const text = document.getElementById('narrative-box').value;
            const btn = document.getElementById('narrative-next');
            document.getElementById('char-count').innerText = `${text.length} / 15 chars`;
            if(text.length >= 15) { btn.disabled = false; btn.classList.remove('opacity-50'); }
            else { btn.disabled = true; btn.classList.add('opacity-50'); }
        }

        document.getElementById('tcpa').addEventListener('change', function() {
            const btn = document.getElementById('submit-btn');
            btn.disabled = !this.checked;
        });

        async function submitFinalLead(e) {
            e.preventDefault();
            
            // 데이터 키 이름을 사장님 서버에 100% 맞춤
            leadData.firstName = document.getElementById('firstName').value;
            leadData.lastName = document.getElementById('lastName').value;
            leadData.email = document.getElementById('email').value;
            leadData.phone = document.getElementById('userPhone').value;
            leadData.description = document.getElementById('narrative-box').value;
            leadData['cf-turnstile-response'] = document.querySelector('[name="cf-turnstile-response"]')?.value;

            document.getElementById('step-8').classList.add('hidden');
            document.getElementById('step-scan').classList.remove('hidden');

            try {
                const response = await fetch('/api/insert-lead', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(leadData)
                });

                const result = await response.json();

                if (response.ok) {
                    window.location.href = '/success';
                } else {
                    // 서버가 보낸 날것의 메시지를 보여줌 (에러 잡기용)
                    alert("Server Rejection: " + (result.error || result.message || "Unknown Error"));
                    document.getElementById('step-scan').classList.add('hidden');
                    document.getElementById('step-8').classList.remove('hidden');
                }
            } catch (err) {
                alert("Network Error: " + err.message);
                document.getElementById('step-scan').classList.add('hidden');
                document.getElementById('step-8').classList.remove('hidden');
            }
        }

        // 전화번호 포맷팅 (사장님 찐 로직)
        document.getElementById('userPhone').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            let m = v.match(/(\d{0,3})(\d{0,3})(\d{0,4})/);
            e.target.value = !m[2] ? m[1] : '(' + m[1] + ') ' + m[2] + (m[3] ? '-' + m[3] : '');
        };
    </script>
</body>
</html>
