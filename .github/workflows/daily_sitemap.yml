import pandas as pd
from datetime import datetime

# 설정
BASE_URL = "https://www.us-settlement-review.com"

def generate_stealth_sitemap():
    # 1. CSV 데이터 로드
    try:
        df = pd.read_csv('top_3000_with_highways.csv')
    except FileNotFoundError:
        print("❌ 에러: CSV 파일을 찾을 수 없습니다.")
        return

    # 2. 족쇄 해제: 100개 제한 로직을 지우고 전체 3,000개를 타겟으로 잡습니다.
    target_list = df 

    # 3. XML 생성 시작
    sitemap_xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
    sitemap_xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
    
    # 메인 페이지 추가
    sitemap_xml += f'  <url><loc>{BASE_URL}/</loc><priority>1.0</priority></url>\n'

    # 3,000개 도시 전체 순회
    for _, row in target_list.iterrows():
        state_id = str(row['state_id']).strip()
        city = str(row['city']).strip()
        
        state_slug = state_id.lower()
        city_slug = city.lower().replace(' ', '-')
        
        # URL 구조 맞춤: /truck/state/city
        url = f"{BASE_URL}/truck/{state_slug}/{city_slug}"
        
        # XML 엔트리 추가
        sitemap_xml += f'  <url>\n'
        sitemap_xml += f'    <loc>{url}</loc>\n'
        sitemap_xml += f'    <lastmod>{datetime.now().strftime("%Y-%m-%d")}</lastmod>\n'
        sitemap_xml += f'    <priority>0.8</priority>\n'
        sitemap_xml += f'  </url>\n'
        
    sitemap_xml += '</urlset>'
    
    # 4. 파일 저장
    with open('sitemap.xml', 'w', encoding='utf-8') as f:
        f.write(sitemap_xml)
        
    print(f"📡 0.1% Stealth Mode: All {len(target_list)} cities indexed in sitemap.xml.")

if __name__ == "__main__":
    generate_stealth_sitemap()